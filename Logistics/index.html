<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跨境物流成本计算器 · Cross-Border Logistics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #0a0c14;
    --bg-2: #151a28;
    --bg-3: #1e2330;
    --gold-1: #c9a961;
    --gold-2: #e8c878;
    --gold-3: #8f7641;
    --cream: #f5edd7;
    --cream-muted: #a8a08a;
    --border: rgba(201, 169, 97, 0.18);
    --border-strong: rgba(201, 169, 97, 0.35);
    --card: rgba(30, 35, 48, 0.55);
    --card-hover: rgba(40, 45, 65, 0.75);
    --accent-text: #1a1f2e;
    --success: #6ba574;
    --error: #d46a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg-1);
    color: var(--cream);
    font-family: 'Inter', 'Noto Serif SC', -apple-system, sans-serif;
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(201, 169, 97, 0.08), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(201, 169, 97, 0.05), transparent 50%),
      linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-1) 100%);
    z-index: -2;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: -1;
    opacity: 0.5;
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 60px;
    position: relative;
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeIn 0.8s 0.2s ease forwards;
  }

  .ornament-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold-1), transparent);
  }

  .ornament-dot {
    width: 6px;
    height: 6px;
    background: var(--gold-1);
    transform: rotate(45deg);
    box-shadow: 0 0 12px rgba(201, 169, 97, 0.5);
  }

  .eyebrow {
    font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
    font-size: 14px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold-1);
    font-weight: 500;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeIn 0.8s 0.3s ease forwards;
  }

  h1 {
    font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 600;
    line-height: 1.1;
    margin-bottom: 16px;
    background: linear-gradient(180deg, var(--cream) 0%, var(--gold-2) 50%, var(--gold-1) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fadeIn 0.9s 0.4s ease forwards;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    color: var(--cream-muted);
    font-style: italic;
    letter-spacing: 0.02em;
    max-width: 500px;
    margin: 0 auto;
    opacity: 0;
    animation: fadeIn 0.9s 0.5s ease forwards;
  }

  .input-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-bottom: 60px;
    padding: 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    position: relative;
    opacity: 0;
    animation: fadeInUp 0.8s 0.6s ease forwards;
    backdrop-filter: blur(10px);
  }

  .input-section::before,
  .input-section::after {
    content: '';
    position: absolute;
    width: 30px;
    height: 30px;
    border: 1px solid var(--gold-1);
    opacity: 0.4;
  }

  .input-section::before {
    top: -1px; left: -1px;
    border-right: none;
    border-bottom: none;
  }

  .input-section::after {
    bottom: -1px; right: -1px;
    border-left: none;
    border-top: none;
  }

  .input-label {
    font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
    font-size: 22px;
    color: var(--cream);
    letter-spacing: 0.05em;
    text-align: center;
  }

  .input-label span {
    color: var(--gold-1);
    font-style: italic;
  }

  .input-group {
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(10, 12, 20, 0.6);
    border: 1px solid var(--border);
    border-radius: 2px;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .input-group:hover {
    border-color: var(--gold-1);
    box-shadow: 0 0 30px rgba(201, 169, 97, 0.1);
  }

  .input-group:focus-within {
    border-color: var(--gold-2);
    box-shadow: 0 0 40px rgba(232, 200, 120, 0.15);
  }

  .input-prefix {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold-1);
    padding: 0 20px 0 24px;
    letter-spacing: 0.1em;
    border-right: 1px solid var(--border);
    font-style: italic;
  }

  input[type="number"] {
    background: transparent;
    border: none;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 500;
    padding: 20px 24px;
    width: 200px;
    text-align: center;
    outline: none;
    letter-spacing: 0.02em;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input[type="number"] {
    -moz-appearance: textfield;
  }

  .input-suffix {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--cream-muted);
    padding: 0 24px 0 20px;
    letter-spacing: 0.1em;
    font-style: italic;
  }

  .quick-weights {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .quick-chip {
    padding: 8px 16px;
    background: rgba(201, 169, 97, 0.05);
    border: 1px solid var(--border);
    color: var(--cream-muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  .quick-chip:hover {
    background: rgba(201, 169, 97, 0.15);
    color: var(--gold-2);
    border-color: var(--gold-1);
    transform: translateY(-1px);
  }

  .error-msg {
    color: var(--error);
    font-size: 13px;
    letter-spacing: 0.08em;
    min-height: 18px;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 36px;
    opacity: 0;
  }

  .results-header.visible {
    animation: fadeIn 0.6s ease forwards;
  }

  .results-header .ornament-line {
    width: 120px;
  }

  .results-title {
    font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
    font-size: 28px;
    color: var(--gold-2);
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .results-subtitle {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--cream-muted);
    font-size: 16px;
    letter-spacing: 0.08em;
    margin-bottom: 36px;
  }

  .tables-grid {
    display: grid;
    gap: 28px;
    opacity: 0;
  }

  .tables-grid.visible {
    animation: fadeInUp 0.7s ease forwards;
  }

  .country-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: all 0.4s ease;
    position: relative;
  }

  .country-table:hover {
    border-color: var(--border-strong);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
  }

  .country-header {
    padding: 22px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, rgba(201, 169, 97, 0.08), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .country-name-group {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .country-flag {
    font-size: 24px;
    filter: grayscale(0.2);
  }

  .country-name {
    font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
    font-size: 24px;
    color: var(--gold-2);
    font-weight: 600;
    letter-spacing: 0.08em;
  }

  .currency-badge {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--gold-1);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: rgba(201, 169, 97, 0.05);
    border-radius: 2px;
  }

  .region-rows {
    display: grid;
    gap: 2px;
  }

  .region-row {
    display: grid;
    grid-template-columns: 1fr 1.3fr 1.3fr 1.3fr;
    gap: 20px;
    padding: 18px 28px;
    background: rgba(10, 12, 20, 0.3);
    transition: all 0.3s ease;
    align-items: center;
  }

  .region-row:hover {
    background: rgba(201, 169, 97, 0.06);
    transform: translateX(4px);
  }

  .region-name {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--cream);
    font-weight: 500;
  }

  .region-marker {
    width: 5px;
    height: 5px;
    background: var(--gold-1);
    border-radius: 50%;
    opacity: 0.5;
  }

  .region-channel {
    font-size: 11px;
    color: var(--cream-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-left: auto;
    font-style: italic;
  }

  .cost-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cost-label {
    font-size: 10px;
    color: var(--cream-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }

  .cost-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--cream);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .total-cost .cost-value {
    color: var(--gold-2);
    font-weight: 600;
    font-size: 22px;
  }

  .total-cost .cost-label {
    color: var(--gold-1);
  }

  .table-head-row {
    display: grid;
    grid-template-columns: 1fr 1.3fr 1.3fr 1.3fr;
    gap: 20px;
    padding: 14px 28px;
    background: rgba(201, 169, 97, 0.04);
    border-bottom: 1px solid var(--border);
  }

  .table-head-cell {
    font-size: 11px;
    color: var(--gold-1);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }

  .footer-note {
    text-align: center;
    margin-top: 60px;
    padding-top: 40px;
    border-top: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    color: var(--cream-muted);
    font-size: 15px;
    font-style: italic;
    letter-spacing: 0.05em;
    opacity: 0;
  }

  .footer-note.visible {
    animation: fadeIn 0.8s ease forwards;
  }

  .footer-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .footer-ornament-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-1), transparent);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 768px) {
    .container { padding: 40px 20px; }

    .input-section { padding: 30px 20px; }

    input[type="number"] { font-size: 26px; width: 140px; }

    .region-row {
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px 20px;
    }

    .region-row > *:nth-child(1) { grid-column: span 2; }

    .table-head-row { display: none; }

    .country-header { padding: 18px 20px; }

    .country-name { font-size: 20px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-dot"></div>
        <div class="ornament-line"></div>
      </div>
      <div class="eyebrow">Cross-Border · Logistics · Atelier</div>
      <h1>跨境物流<br>成本计算器</h1>
      <p class="subtitle">Precision in every gram. Clarity across every border.</p>
    </header>

    <section class="input-section">
      <div class="input-label">请输入商品重量 <span>Enter Product Weight</span></div>
      <div class="input-group">
        <span class="input-prefix">W</span>
        <input type="number" id="weightInput" placeholder="0" min="1" step="1" />
        <span class="input-suffix">克 / grams</span>
      </div>
      <div class="quick-weights">
        <button class="quick-chip" data-weight="5">5g</button>
        <button class="quick-chip" data-weight="10">10g</button>
        <button class="quick-chip" data-weight="25">25g</button>
        <button class="quick-chip" data-weight="50">50g</button>
        <button class="quick-chip" data-weight="100">100g</button>
        <button class="quick-chip" data-weight="200">200g</button>
        <button class="quick-chip" data-weight="500">500g</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </section>

    <div id="resultsContainer" style="display: none;">
      <div class="results-header visible">
        <div class="ornament-line"></div>
        <div class="results-title">计算结果 · Cost Breakdown</div>
        <div class="ornament-line"></div>
      </div>
      <div class="results-subtitle" id="resultsSubtitle"></div>
      <div class="tables-grid visible" id="tablesGrid"></div>
    </div>

    <footer class="footer-note visible">
      <div class="footer-ornament">
        <div class="footer-ornament-line"></div>
        <span style="color: var(--gold-1); font-size: 12px; letter-spacing: 0.3em;">◆</span>
        <div class="footer-ornament-line"></div>
      </div>
      Calculated with precision · Based on official rate cards · Updated in real-time
    </footer>
  </div>

<script>
  const PRICING_RULES = [
    { country: "泰国", countryEn: "Thailand", flag: "🇹🇭", regions: [
      { region: "Zone A", channel: "Standard", currency: "THB", currencySymbol: "฿", currencyDecimals: 0,
        crossBorder: { baseWeight: 10, basePrice: 1, continuationPrice: 1 },
        buyer: { baseWeight: 10, basePrice: 24, continuationPrice: 1 }
      },
      { region: "Zone B", channel: "Standard", currency: "THB", currencySymbol: "฿", currencyDecimals: 0,
        crossBorder: { baseWeight: 10, basePrice: 1, continuationPrice: 1 },
        buyer: { baseWeight: 10, basePrice: 37, continuationPrice: 1 }
      },
      { region: "Zone C", channel: "—", currency: "THB", currencySymbol: "฿", currencyDecimals: 0,
        crossBorder: { baseWeight: 10, basePrice: 1, continuationPrice: 1 },
        buyer: { baseWeight: 10, basePrice: 80, continuationPrice: 1 }
      }
    ]},
    { country: "越南", countryEn: "Vietnam", flag: "🇻🇳", regions: [
      { region: "Zone A", channel: "Economy", currency: "VND", currencySymbol: "₫", currencyDecimals: 0,
        crossBorder: { baseWeight: 10, basePrice: 10900, continuationPrice: 900 },
        buyer: { baseWeight: 10, basePrice: 25900, continuationPrice: 900 }
      },
      { region: "Zone B", channel: "—", currency: "VND", currencySymbol: "₫", currencyDecimals: 0,
        crossBorder: { baseWeight: 10, basePrice: 10900, continuationPrice: 900 },
        buyer: { baseWeight: 10, basePrice: 27900, continuationPrice: 900 }
      },
      { region: "Zone C", channel: "—", currency: "VND", currencySymbol: "₫", currencyDecimals: 0,
        crossBorder: { baseWeight: 10, basePrice: 10900, continuationPrice: 900 },
        buyer: { baseWeight: 10, basePrice: 27900, continuationPrice: 900 }
      },
      { region: "Zone D", channel: "Standard", currency: "THB", currencySymbol: "฿", currencyDecimals: 0,
        crossBorder: { baseWeight: 10, basePrice: 10900, continuationPrice: 900 },
        buyer: { baseWeight: 10, basePrice: 40900, continuationPrice: 900 }
      }
    ]},
    { country: "马来西亚", countryEn: "Malaysia", flag: "🇲🇾", regions: [
      { region: "西马", channel: "Standard", currency: "MYR", currencySymbol: "RM", currencyDecimals: 2,
        crossBorder: { baseWeight: 10, basePrice: 0.15, continuationPrice: 0.15 },
        buyer: { baseWeight: 10, basePrice: 5.05, continuationPrice: 0.15 }
      },
      { region: "东马", channel: "Standard", currency: "MYR", currencySymbol: "RM", currencyDecimals: 2,
        crossBorder: { baseWeight: 10, basePrice: 0.15, continuationPrice: 0.15 },
        buyer: { baseWeight: 10, basePrice: 10.15, continuationPrice: 0.15 }
      }
    ]},
    { country: "菲律宾", countryEn: "Philippines", flag: "🇵🇭", regions: [
      { region: "马尼拉", channel: "Standard", currency: "PHP", currencySymbol: "₱", currencyDecimals: 2,
        crossBorder: { baseWeight: 10, basePrice: 10.50, continuationPrice: 4.50 },
        buyer: { baseWeight: 10, basePrice: 50.50, continuationPrice: 4.50 }
      },
      { region: "其他区", channel: "Standard", currency: "PHP", currencySymbol: "₱", currencyDecimals: 2,
        crossBorder: { baseWeight: 10, basePrice: 10.50, continuationPrice: 4.50 },
        buyer: { baseWeight: 10, basePrice: 70.50, continuationPrice: 4.50 }
      }
    ]},
    { country: "新加坡", countryEn: "Singapore", flag: "🇸🇬", regions: [
      { region: "全境", channel: "Standard", currency: "SGD", currencySymbol: "S$", currencyDecimals: 2,
        crossBorder: { baseWeight: 40, basePrice: 0.98, continuationPrice: 0.15 },
        buyer: { baseWeight: 40, basePrice: 0.98, continuationPrice: 0.15 }
      }
    ]}
  ];

  function calculateFee(weight, pricing) {
    const extraGrams = Math.max(0, weight - pricing.baseWeight);
    const extraUnits = Math.ceil(extraGrams / 10);
    return pricing.basePrice + extraUnits * pricing.continuationPrice;
  }

  function formatCurrency(value, currency, decimals, symbol) {
    const formatted = value.toLocaleString('en-US', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals
    });
    return `${symbol} ${formatted}`;
  }

  function renderResults(weight) {
    const container = document.getElementById('resultsContainer');
    const grid = document.getElementById('tablesGrid');
    const subtitle = document.getElementById('resultsSubtitle');
    grid.innerHTML = '';

    subtitle.textContent = `基于商品重量 ${weight} 克 · Based on ${weight}g product weight`;

    PRICING_RULES.forEach((countryData) => {
      const tableHTML = `
        <div class="country-table">
          <div class="country-header">
            <div class="country-name-group">
              <span class="country-flag">${countryData.flag}</span>
              <span class="country-name">${countryData.country} · ${countryData.countryEn}</span>
            </div>
            <span class="currency-badge">${countryData.regions[0].currency}</span>
          </div>
          <div class="table-head-row">
            <div class="table-head-cell">地区 / Region</div>
            <div class="table-head-cell">跨境物流成本<br>Cross-Border</div>
            <div class="table-head-cell">买家支付运费<br>Buyer Shipping</div>
            <div class="table-head-cell">卖家总支付<br>Total Seller Fee</div>
          </div>
          <div class="region-rows">
            ${countryData.regions.map(region => {
              const crossBorder = calculateFee(weight, region.crossBorder);
              const buyerFee = calculateFee(weight, region.buyer);
              const total = crossBorder + buyerFee;

              const symbol = region.currencySymbol;
              const decimals = region.currencyDecimals;

              return `
                <div class="region-row">
                  <div class="region-name">
                    <span class="region-marker"></span>
                    ${region.region}
                    <span class="region-channel">${region.channel}</span>
                  </div>
                  <div class="cost-block">
                    <span class="cost-label">Cross-border</span>
                    <span class="cost-value">${formatCurrency(crossBorder, region.currency, decimals, symbol)}</span>
                  </div>
                  <div class="cost-block">
                    <span class="cost-label">Buyer Shipping</span>
                    <span class="cost-value">${formatCurrency(buyerFee, region.currency, decimals, symbol)}</span>
                  </div>
                  <div class="cost-block total-cost">
                    <span class="cost-label">Total</span>
                    <span class="cost-value">${formatCurrency(total, region.currency, decimals, symbol)}</span>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
      grid.insertAdjacentHTML('beforeend', tableHTML);
    });

    container.style.display = 'block';
  }

  function validateAndCalculate() {
    const input = document.getElementById('weightInput');
    const errorMsg = document.getElementById('errorMsg');
    const value = parseFloat(input.value);

    if (isNaN(value) || value <= 0) {
      errorMsg.textContent = '请输入大于 0 的有效重量（克）';
      document.getElementById('resultsContainer').style.display = 'none';
      return;
    }

    errorMsg.textContent = '';
    renderResults(value);
  }

  document.getElementById('weightInput').addEventListener('input', validateAndCalculate);

  document.querySelectorAll('.quick-chip').forEach(btn => {
    btn.addEventListener('click', function() {
      const weight = this.dataset.weight;
      document.getElementById('weightInput').value = weight;
      validateAndCalculate();
    });
  });
</script>
</body>
</html>
